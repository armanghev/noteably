<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
    <title>Noteably - Browse everything.</title>
    <script>
      // Set sidebar state before React hydrates to prevent flash
      (function() {
        try {
          const stored = localStorage.getItem('sidebar-open');
          const isOpen = stored !== null ? JSON.parse(stored) : true;
          document.documentElement.setAttribute('data-sidebar-open', isOpen);
        } catch (e) {
          document.documentElement.setAttribute('data-sidebar-open', 'true');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
